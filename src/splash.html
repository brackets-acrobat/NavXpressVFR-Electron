<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>NavXpressVFR</title>
  <style>
    /* Fenêtre transparente : seul le panneau arrondi est visible. */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
    }

    .splash {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 26px;
      padding: 30px;
      background: radial-gradient(circle at 50% 38%, #1b1b1b 0%, #121212 70%);
      border: 1px solid rgba(0, 188, 212, 0.55);
      border-radius: 18px;
      box-shadow:
        0 0 0 1px rgba(0, 229, 255, 0.15),
        0 0 28px rgba(0, 188, 212, 0.35),
        inset 0 0 40px rgba(0, 188, 212, 0.06);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Logo 256×256 (50 % de l'original 512×512) avec halo néon pulsant. */
    .logo {
      width: 256px;
      height: 256px;
      object-fit: contain;
      animation: neon-pulse 2.4s ease-in-out infinite;
    }

    @keyframes neon-pulse {
      0%, 100% {
        filter:
          drop-shadow(0 0 4px rgba(0, 229, 255, 0.55))
          drop-shadow(0 0 14px rgba(0, 188, 212, 0.45));
      }
      50% {
        filter:
          drop-shadow(0 0 10px rgba(0, 229, 255, 0.9))
          drop-shadow(0 0 28px rgba(0, 188, 212, 0.75));
      }
    }

    .title {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0, 188, 212, 0.75);
    }

    /* Barre de progression indéterminée, style cyan néon de l'app. */
    .bar {
      position: relative;
      width: 220px;
      height: 5px;
      border-radius: 3px;
      background: rgba(0, 188, 212, 0.14);
      overflow: hidden;
      box-shadow: 0 0 6px rgba(0, 188, 212, 0.25);
    }

    .bar::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 40%;
      border-radius: 3px;
      background: linear-gradient(90deg,
        rgba(0, 188, 212, 0) 0%,
        #00bcd4 45%,
        #00e5ff 50%,
        #00bcd4 55%,
        rgba(0, 188, 212, 0) 100%);
      box-shadow: 0 0 10px rgba(0, 229, 255, 0.8);
      animation: bar-slide 1.4s ease-in-out infinite;
    }

    @keyframes bar-slide {
      0%   { left: -45%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <img class="logo" src="img/logo_icone.png" alt="NavXpressVFR" />
    <div class="title">Chargement…</div>
    <div class="bar"></div>
  </div>
</body>
</html>
